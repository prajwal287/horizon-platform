version: 2

sources:
  - name: lakehouse_raw
    description: >
      Raw tables produced by scripts/load_gcs_to_bigquery.py (dlt → GCS → BigQuery).
      Optional sources: set var raw_tables_present (see dbt_project.yml) or run
      scripts/dbt_raw_tables_vars.py so dbt matches loaded tables (get_relation is not used at parse).
    database: "{{ env_var('GOOGLE_CLOUD_PROJECT') }}"
    schema: "{{ env_var('BIGQUERY_DATASET', 'job_market_analysis') }}"
    tables:
      - name: raw_huggingface_data_jobs
      - name: raw_kaggle_data_engineer_2023
      - name: raw_kaggle_linkedin_postings
      - name: raw_kaggle_linkedin_jobs_skills_2024
