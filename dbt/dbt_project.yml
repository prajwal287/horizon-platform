name: horizon_platform
version: 1.0.0
config-version: 2

profile: horizon_platform

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - target
  - dbt_packages

# Medallion layout (BigQuery datasets): bronze → silver → gold
models:
  horizon_platform:
    bronze:
      +materialized: view
      +schema: dbt_bronze
      +tags: ["bronze"]
    silver:
      +materialized: view
      +schema: dbt_silver
      +tags: ["silver"]
    gold:
      +materialized: view
      +schema: dbt_gold
      +tags: ["gold"]

vars:
  bigquery_dataset: job_market_analysis
  # Tables in job_market_analysis that exist after load_gcs_to_bigquery. Trim entries you did not load,
  # or from repo root run: dbt run --vars "$(python scripts/dbt_raw_tables_vars.py --json)"
  raw_tables_present:
    - raw_huggingface_data_jobs
    - raw_kaggle_data_engineer_2023
    - raw_kaggle_linkedin_postings
    - raw_kaggle_linkedin_jobs_skills_2024
