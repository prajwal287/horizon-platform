name: horizon_platform
version: 1.0.0
config-version: 2

profile: horizon_platform

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - target
  - dbt_packages

# Medallion layout (BigQuery datasets): bronze → silver → gold
models:
  horizon_platform:
    bronze:
      +materialized: view
      +schema: dbt_bronze
      +tags: ["bronze"]
    silver:
      +materialized: view
      +schema: dbt_silver
      +tags: ["silver"]
    gold:
      +materialized: view
      +schema: dbt_gold
      +tags: ["gold"]

vars:
  bigquery_dataset: job_market_analysis
