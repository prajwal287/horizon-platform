services:
  app:
    build: .
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets
      # Use host's gcloud Application Default Credentials (no manual key file)
      - ${HOME}/.config/gcloud:/app/gcloud:ro
    # Load .env so container gets GOOGLE_CLOUD_PROJECT, BIGQUERY_DATASET, KAGGLE_* (copy .env.example to .env)
    env_file:
      - path: .env
        required: false
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcloud/application_default_credentials.json
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-${GCP_PROJECT:-}}
      - GCS_BUCKET=${GCS_BUCKET:-}
      - BIGQUERY_DATASET=${BIGQUERY_DATASET:-job_market_analysis}
      - KAGGLE_USERNAME=${KAGGLE_USERNAME:-}
      - KAGGLE_KEY=${KAGGLE_KEY:-}
      - KAGGLE_API_TOKEN=${KAGGLE_API_TOKEN:-}
    command: tail -f /dev/null

  streamlit:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ${HOME}/.config/gcloud:/app/gcloud:ro
    env_file:
      - path: .env
        required: false
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcloud/application_default_credentials.json
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-${GCP_PROJECT:-}}
      - BIGQUERY_DATASET=${BIGQUERY_DATASET:-job_market_analysis}
    command:
      [
        "streamlit",
        "run",
        "streamlit_app/app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
      ]
